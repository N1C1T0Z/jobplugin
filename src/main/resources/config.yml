# ─── Système de Niveaux ───
level-system:
  tiers:
    - level-range: 1-10
      xp-multiplier: 100
    - level-range: 11-25
      xp-multiplier: 250
    - level-range: 26-50
      xp-multiplier: 500
    - level-range: 51-75
      xp-multiplier: 1000
    - level-range: 76-100
      xp-multiplier: 2000
  max-level: 100

# ─── Récompenses ───
rewards:
  base-money: 50.0
  money-per-level: 10.0

# ─── Renaissance ───
prestige:
  max-prestige: 10
  multiplier-per-prestige: 1.5